<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
/* ============================================
   COLOR FORMULA (60-30-10)
   60% — warm neutrals (background, spacing)
   30% — images/media (the visual star)
   10% — muted gold accent (lines, highlights)
   ============================================ */
:root {
  --bg:        #f7f4ef;
  --bg-warm:   #f2ede5;
  --surface:   #fefdfb;
  --text:      #2c2416;
  --text-soft: #8a8478;
  --text-dim:  #b8b2a6;
  --gold:      #b8944b;
  --gold-lit:  #d4bc8b;
  --line:      #e4ded4;
  --line-lit:  #ede8df;
  --shadow:    0 2px 16px rgba(0,0,0,.05);
  --shadow-md: 0 4px 24px rgba(0,0,0,.07);
  --radius:    4px;
  --ease:      cubic-bezier(0.33, 0.66, 0.66, 1);
  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);
}

* { margin:0; padding:0; box-sizing:border-box; }

html {
  scroll-behavior:smooth;
  font-size:16px;
  background:var(--bg);
}

body {
  font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  transition: background .5s;
}

/* ===== Background Overlay ===== */
.bg-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0; transition: opacity .8s;
}
.bg-overlay.active {
  opacity: 1;
  background-size: cover; background-position: center;
  background-repeat: no-repeat;
}
.bg-overlay::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(247,244,239,.82);
}

/* ===== Top Bar ===== */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 1.2rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  mix-blend-mode: normal;
  background: linear-gradient(to bottom, rgba(247,244,239,.95) 60%, rgba(247,244,239,0));
}
.topbar-left {
  font-family: 'Cormorant Garamond', 'Playfair Display', serif;
  font-size: 1rem; font-weight: 400; letter-spacing: 4px;
  color: var(--text-soft); text-transform: uppercase;
}
.topbar-right { display: flex; gap: 2px; }
.tb-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: none; background: transparent;
  color: var(--text-soft); cursor: pointer;
  font-size: .85rem; display: flex; align-items: center; justify-content: center;
  transition: all .3s; position: relative;
}
.tb-btn:hover { color: var(--gold); background: rgba(184,148,75,.08); }
.tb-btn.active { color: var(--gold); background: rgba(184,148,75,.12); }

/* ===== Main Stream ===== */
.main-stream {
  position: relative; z-index: 1;
  max-width: 900px; margin: 0 auto;
  padding: 6rem 2rem 4rem;
  display: flex; flex-direction: column;
  gap: 7rem;
}

/* ===== Media Item ===== */
.media-item {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  min-height: 200px;
  animation: reveal .9s var(--ease-out) both;
}
@keyframes reveal {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}

.media-stage {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  transition: transform .5s var(--ease-out), filter .5s var(--ease-out);
}

/* ===== Image ===== */
.media-img {
  display: block;
  max-width: 100%;
  max-height: 75vh;
  width: auto; height: auto;
  object-fit: contain;
  border-radius: 2px;
  box-shadow: var(--shadow);
  transition: transform .5s var(--ease-out), box-shadow .5s var(--ease-out);
  cursor: zoom-in;
}
.media-item:hover .media-img {
  transform: scale(1.03);
  box-shadow: var(--shadow-md);
}
.media-item:hover .media-stage {
  transform: scale(1.03);
}

/* ===== Video ===== */
.media-video-wrap {
  position: relative; cursor: pointer;
  max-width: 100%; width: 100%;
  border-radius: 2px; overflow: hidden;
  box-shadow: var(--shadow);
  transition: transform .5s var(--ease-out), box-shadow .5s var(--ease-out);
  background: #000;
}
.media-item:hover .media-video-wrap {
  transform: scale(1.03);
  box-shadow: var(--shadow-md);
}
.media-video-wrap video {
  display: block; width: 100%; max-height: 75vh;
  object-fit: contain; background: #111;
}
.media-video-wrap .play-badge {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; transition: opacity .4s;
}
.media-video-wrap .play-badge::after {
  content: ''; width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,.85);
  box-shadow: 0 4px 20px rgba(0,0,0,.12);
  position: relative;
}
.media-video-wrap .play-badge::before {
  content: ''; position: absolute; z-index: 1;
  width: 0; height: 0;
  border-left: 18px solid #2c2416;
  border-top: 11px solid transparent;
  border-bottom: 11px solid transparent;
  margin-left: 4px;
}
.media-video-wrap.playing .play-badge { opacity: 0; }

/* ===== Annotation ===== */
.anno {
  position: absolute; top: 50%; transform: translateY(-50%);
  max-width: 160px; opacity: 0;
  transition: opacity .4s var(--ease-out), transform .4s var(--ease-out);
  pointer-events: none; z-index: 5;
}
.anno.anno-left  { right: calc(100% + 2rem); text-align: right;  transform: translateY(-50%) translateX(-8px); }
.anno.anno-right { left:  calc(100% + 2rem); text-align: left;   transform: translateY(-50%) translateX(8px); }
.media-item:hover .anno { opacity: 1; transform: translateY(-50%) translateX(0); pointer-events: auto; }
.anno-text {
  font-family: 'Noto Serif SC', serif;
  font-size: .9rem; font-weight: 300; line-height: 1.8;
  color: var(--text-soft); letter-spacing: .5px;
  font-style: italic;
}
.anno-line {
  display: inline-block; width: 20px; height: 1px;
  background: var(--gold); vertical-align: middle;
  margin: 0 .6rem; opacity: .6;
}

/* ===== Edit Mode ===== */
.edit-mode .media-img { cursor: pointer; }
.edit-mode .media-item:hover .media-img {
  transform: scale(1.03); box-shadow: 0 0 0 2px var(--gold), var(--shadow-md);
}
.edit-mode .media-item:hover .media-stage { transform: scale(1.03); }
.edit-mode .anno { opacity: .8 !important; }
.edit-mode .anno-text {
  outline: 1px dashed rgba(184,148,75,.25);
  padding: .4rem .6rem; border-radius: 3px;
  font-style: normal; font-size: .8rem; cursor: text;
  pointer-events: auto;
}
.edit-mode .anno-text:focus { outline: 1px solid var(--gold); }

.edit-mode .media-delete {
  display: block;
  position: absolute; top: -2rem; right: 0;
  background: none; border: none; color: #c44;
  cursor: pointer; font-size: .8rem; opacity: 0;
  transition: opacity .3s;
}
.edit-mode .media-item:hover .media-delete { opacity: 1; }
.media-delete { display: none; }

/* ===== Add Bar ===== */
.add-bar {
  display: none; position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%); z-index: 50; gap: 1rem;
}
.edit-mode .add-bar { display: flex; }
.add-btn {
  padding: .6rem 1.4rem; border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--surface); color: var(--text-soft);
  cursor: pointer; font-family: inherit; font-size: .85rem;
  letter-spacing: 1px; box-shadow: var(--shadow);
  transition: all .3s;
}
.add-btn:hover { border-color: var(--gold); color: var(--gold); box-shadow: var(--shadow-md); }

/* ===== Edit Overlay ===== */
.edit-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(44,36,22,.4); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.edit-overlay.open { display: flex; }
.edit-card {
  background: var(--surface); border-radius: 12px;
  padding: 2.5rem; max-width: 460px; width: 92%;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
}
.edit-card h3 {
  font-weight: 400; font-size: 1.1rem; margin-bottom: 1.5rem;
  color: var(--text); letter-spacing: 1px;
}
.edit-card label {
  display: block; font-size: .78rem; color: var(--text-dim);
  margin-bottom: .3rem; letter-spacing: .5px;
}
.edit-card textarea, .edit-card input {
  width: 100%; padding: .7rem .9rem; margin-bottom: 1.2rem;
  background: var(--bg); border: 1px solid var(--line);
  border-radius: 6px; color: var(--text); font-family: inherit;
  font-size: .9rem; resize: vertical;
}
.edit-card textarea { min-height: 60px; }
.edit-card textarea:focus, .edit-card input:focus {
  outline: none; border-color: var(--gold);
}
.edit-card .btn-row { display: flex; gap: .6rem; justify-content: flex-end; }

.btn {
  padding: .6rem 1.4rem; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: .85rem; border: none; transition: all .25s;
}
.btn-prime { background: var(--gold); color: #fff; }
.btn-prime:hover { background: #a3823e; }
.btn-ghost { background: transparent; color: var(--text-soft); border: 1px solid var(--line); }
.btn-ghost:hover { border-color: var(--text-soft); }
.btn-danger { background: transparent; color: #c44; border: 1px solid rgba(204,68,68,.2); }
.btn-danger:hover { background: rgba(204,68,68,.06); }

/* ===== Settings Panel ===== */
.settings-panel {
  position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
  z-index: 250; background: var(--surface);
  border-left: 1px solid var(--line); padding: 4.5rem 2rem 2rem;
  overflow-y: auto; transition: right .4s var(--ease-out);
  box-shadow: -4px 0 24px rgba(0,0,0,.04);
}
.settings-panel.open { right: 0; }
.settings-panel h3 {
  font-weight: 400; color: var(--gold); margin-bottom: 1.8rem;
  font-family: 'Cormorant Garamond', serif; font-size: 1.2rem;
  letter-spacing: 2px;
}
.settings-group { margin-bottom: 2rem; }
.settings-group label {
  display: block; font-size: .78rem; color: var(--text-dim);
  margin-bottom: .5rem; letter-spacing: .5px;
}
.settings-group input[type="text"] {
  width: 100%; padding: .7rem .9rem; background: var(--bg);
  border: 1px solid var(--line); border-radius: 6px;
  color: var(--text); font-family: inherit; font-size: .85rem;
}
.settings-group input:focus { outline: none; border-color: var(--gold); }
.upload-zone {
  display: flex; align-items: center; gap: .7rem;
  padding: .8rem 1rem; background: var(--bg);
  border: 1px dashed var(--line-lit); border-radius: 6px;
  cursor: pointer; color: var(--text-soft); font-size: .85rem;
  transition: all .3s;
}
.upload-zone:hover { border-color: var(--gold); color: var(--gold); }
.settings-overlay {
  display: none; position: fixed; inset: 0; z-index: 240;
}
.settings-overlay.open { display: block; }

/* ===== Music Mini ===== */
.music-mini {
  position: fixed; bottom: 2rem; right: 2rem; z-index: 80;
  display: flex; align-items: center; gap: .5rem;
  background: var(--surface); border-radius: 999px;
  padding: .4rem .8rem .4rem .4rem;
  border: 1px solid var(--line-lit);
  box-shadow: var(--shadow); transition: all .3s;
}
.music-mini:hover { border-color: var(--line); box-shadow: var(--shadow-md); }
.music-mini-btn {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--bg); color: var(--text-soft);
  cursor: pointer; font-size: .7rem; display: flex;
  align-items: center; justify-content: center; transition: all .25s;
}
.music-mini-btn:hover { background: var(--gold); color: #fff; }
.music-mini span {
  font-size: .75rem; color: var(--text-dim);
  max-width: 100px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; cursor: pointer;
}
.music-mini span:hover { color: var(--gold); }

/* ===== Lightbox ===== */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(44,36,22,.94); align-items: center;
  justify-content: center; cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 94vw; max-height: 92vh; object-fit: contain; border-radius: 2px; }
.lightbox-close {
  position: absolute; top: 1.5rem; right: 2rem;
  color: rgba(255,255,255,.5); font-size: 2.5rem; cursor: pointer;
  background: none; border: none; font-weight: 200;
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center; padding: 8rem 2rem; color: var(--text-dim);
}
.empty-state p { margin-bottom: 1.5rem; font-weight: 300; }
.empty-state .btn { border-radius: 999px; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .main-stream { max-width: 100%; padding: 5rem 1rem 3rem; gap: 4rem; }
  .anno { display: none; }
  .topbar { padding: 1rem 1.2rem; }
  .settings-panel { width: 100%; right: -100%; }
}
@media (max-width: 480px) {
  .main-stream { gap: 2.5rem; }
  .media-img { max-height: 60vh; }
  .topbar-left { font-size: .85rem; letter-spacing: 2px; }
}
</style>
</head>
<body>

<!-- Background Overlay -->
<div class="bg-overlay" id="bgOverlay"></div>

<!-- Top Bar -->
<header class="topbar">
  <div class="topbar-left" id="topTitle" contenteditable="false">MY SPACE</div>
  <div class="topbar-right">
    <button class="tb-btn" onclick="toggleSettings('bg')" title="背景">🖼</button>
    <button class="tb-btn" onclick="toggleSettings('music')" title="配乐">♪</button>
    <button class="tb-btn" id="editToggle" onclick="toggleEdit()" title="编辑">✎</button>
  </div>
</header>

<!-- Main Stream -->
<main class="main-stream" id="mainStream"></main>

<!-- Empty State -->
<div class="empty-state" id="emptyState" style="display:none">
  <p>空空如也</p>
  <button class="btn btn-prime" onclick="document.getElementById('uploadPhoto').click()">＋ 添加照片</button>
</div>

<!-- Add Bar -->
<div class="add-bar" id="addBar">
  <button class="add-btn" onclick="document.getElementById('uploadPhoto').click()">＋ 照片</button>
  <button class="add-btn" onclick="document.getElementById('uploadVideo').click()">＋ 视频</button>
</div>

<!-- Edit Overlay -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-card">
    <h3>编辑标注</h3>
    <label>左侧文字</label>
    <textarea id="eoLeft" placeholder="悬停时显示在照片左侧..."></textarea>

  <h3 id="settingsTitle">设置</h3>
  <div id="settingsContent"></div>
</div>

<!-- Hidden Inputs -->
<input type="file" id="uploadPhoto" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
<input type="file" id="uploadVideo" accept="video/*" style="display:none" onchange="addVideo(this)">
<input type="file" id="uploadBg" accept="image/*" style="display:none" onchange="changeBg(this)">
<input type="file" id="uploadAudio" accept="audio/*" style="display:none" onchange="changeMusic(this)">

<script>
// ==================== INDEXEDDB ====================
function idb() {
  return new Promise((resolve, reject) => {
    const r = indexedDB.open('myspace_blobs', 1);
    r.onupgradeneeded = () => { r.result.createObjectStore('blobs'); };
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  });
}

async function idbPut(key, val) {
  const db = await idb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('blobs', 'readwrite');
    tx.objectStore('blobs').put(val, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGet(key) {
  const db = await idb();
  return new Promise((resolve) => {
    const tx = db.transaction('blobs', 'readonly');
    const req = tx.objectStore('blobs').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

async function idbDel(key) {
  const db = await idb();
  return new Promise((resolve) => {
    const tx = db.transaction('blobs', 'readwrite');
    tx.objectStore('blobs').delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => resolve();
  });
}

// ==================== DATA ====================
const META_KEY = 'myspace_meta';

const DEFAULTS = {
  title: 'MY SPACE',
  bg: '',
  musicUrl: '', musicName: '',
  media: [
    { type:'image', w:1600, h:1200, left:'', right:'' },
    { type:'image', w:1200, h:1600, left:'', right:'' },
    { type:'image', w:1600, h:1067, left:'', right:'' },
    { type:'image', w:1200, h:1600, left:'', right:'' },
    { type:'image', w:1600, h:1200, left:'', right:'' },
    { type:'video', w:1920, h:1080, left:'', right:'' },
  ]
};

// Metadata in localStorage (no file data)
function loadMeta() {
  try { const r = localStorage.getItem(META_KEY); return r ? JSON.parse(r) : null; }
  catch(e) { return null; }
}
function saveMeta(d) {
  const clean = JSON.parse(JSON.stringify(d));
  // Strip transient src fields from metadata
  clean.media.forEach(m => { delete m.src; delete m.poster; });
  localStorage.setItem(META_KEY, JSON.stringify(clean));
}

// Full data: metadata + blob URLs from IndexedDB
async function loadFull() {
  let d = loadMeta();
  if (!d) { d = JSON.parse(JSON.stringify(DEFAULTS)); saveMeta(d); return d; }
  d.title = d.title ?? DEFAULTS.title;
  d.bg = d.bg ?? DEFAULTS.bg;
  d.musicUrl = d.musicUrl ?? DEFAULTS.musicUrl;
  d.musicName = d.musicName ?? DEFAULTS.musicName;
  d.media = d.media ?? DEFAULTS.media;
  // Load blob src from IDB
  for (let i = 0; i < d.media.length; i++) {
    const src = await idbGet('src_' + i);
    if (src) d.media[i].src = src;
    const poster = await idbGet('poster_' + i);
    if (poster) d.media[i].poster = poster;
  }
  return d;
}

// Save full data: metadata to LS, blobs to IDB
async function saveFull(d) {
  saveMeta(d);
  const tasks = [];
  for (let i = 0; i < d.media.length; i++) {
    if (d.media[i].src) tasks.push(idbPut('src_' + i, d.media[i].src));
    if (d.media[i].poster) tasks.push(idbPut('poster_' + i, d.media[i].poster));
  }
  await Promise.all(tasks);
}

// Helper: save meta + all blobs for the current cache
async function persist() {
  await saveFull(_cache);
}

// Clean orphaned IDB entries
async function cleanIdb(maxIdx) {
  // Delete blobs for indices >= maxIdx (shifted after deletion)
  // We just clean all then re-save — safest
}

// ==================== CACHE ====================
let _cache = null;
let editMode = false;
let editingIdx = -1;
let settingsType = '';

function meta() { return _cache; } // synchronous access to current state

// ==================== MIGRATION ====================
async function migrateOldData() {
  try {
    const old = localStorage.getItem('myspace_v2');
    if (!old) return;
    const d = JSON.parse(old);
    if (!d.media || !d.media.length) return;
    // Check if we already have meta; if so, skip migration
    if (localStorage.getItem(META_KEY)) return;
    // Migrate: save blobs to IDB, meta to LS
    for (let i = 0; i < d.media.length; i++) {
      if (d.media[i].src) await idbPut('src_' + i, d.media[i].src);
      if (d.media[i].poster) await idbPut('poster_' + i, d.media[i].poster);
    }
    saveMeta(d);
    localStorage.removeItem('myspace_v2'); // clean old key
  } catch(_) {}
}

// ==================== INIT ====================
async function init() {
  await migrateOldData();
  _cache = await loadFull();
  document.getElementById('topTitle').textContent = _cache.title || 'MY SPACE';
  applyBg(_cache.bg);
  applyMusic(_cache.musicUrl, _cache.musicName);
  renderStream();
}

function applyBg(bg) {
  const el = document.getElementById('bgOverlay');
  if (bg) {
    el.classList.add('active');
    el.style.backgroundImage = 'url(' + bg + ')';
  } else {
    el.classList.remove('active');
    el.style.backgroundImage = '';
  }
}

function applyMusic(url, name) {
  const audio = document.getElementById('audioPlayer');
  const label = document.getElementById('musicLabel');
  if (url) { audio.src = url; label.textContent = name || '配乐'; }
  else { audio.src = ''; label.textContent = '未选择'; }
}

// ==================== RENDER ====================
function renderStream() {
  const stream = document.getElementById('mainStream');
  const empty = document.getElementById('emptyState');
  const media = _cache.media || [];

  stream.innerHTML = '';
  if (media.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  media.forEach((item, i) => {
    const el = createMediaItem(item, i);
    el.style.animationDelay = (i * .1) + 's';
    stream.appendChild(el);
  });
}

function createMediaItem(item, idx) {
  const wrapper = document.createElement('div');
  wrapper.className = 'media-item';
  wrapper.dataset.index = idx;

  const stage = document.createElement('div');
  stage.className = 'media-stage';

  if (item.type === 'video') {
    const vWrap = document.createElement('div');
    vWrap.className = 'media-video-wrap';

    const video = document.createElement('video');
    video.src = item.src || '';
    video.muted = true; video.loop = true; video.playsInline = true;
    if (item.poster) video.poster = item.poster;

    const badge = document.createElement('div');
    badge.className = 'play-badge';

    vWrap.appendChild(video);
    vWrap.appendChild(badge);

    vWrap.addEventListener('mouseenter', () => { video.play().catch(()=>{}); vWrap.classList.add('playing'); });
    vWrap.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; vWrap.classList.remove('playing'); });
    vWrap.addEventListener('click', (e) => {
      if (editMode) { e.stopPropagation(); openEditOverlay(idx); }
    });

    stage.appendChild(vWrap);
  } else {
    const img = document.createElement('img');
    img.className = 'media-img';
    img.src = item.src || placeholder(item.w, item.h);
    img.alt = 'Photo';
    img.loading = 'lazy';
    img.addEventListener('click', (e) => {
      if (editMode) { e.stopPropagation(); openEditOverlay(idx); return; }
      openLightbox(item.src || placeholder(item.w, item.h));
    });
    stage.appendChild(img);
  }

  const delBtn = document.createElement('button');
  delBtn.className = 'media-delete';
  delBtn.textContent = '× 删除';
  delBtn.onclick = function(e) { e.stopPropagation(); deleteMedia(idx); };

  wrapper.appendChild(stage);
  wrapper.appendChild(delBtn);

  if (item.left || editMode) wrapper.appendChild(createAnno('left', item.left));
  if (item.right || editMode) wrapper.appendChild(createAnno('right', item.right));

  return wrapper;
}

function createAnno(side, text) {
  const el = document.createElement('div');
  el.className = 'anno anno-' + side;
  const inner = document.createElement('span');
  inner.className = 'anno-text';
  inner.textContent = text || (side === 'left' ? '左侧标注' : '右侧标注');
  const line = document.createElement('span');
  line.className = 'anno-line';
  if (side === 'left') { el.appendChild(inner); el.appendChild(line); }
  else { el.appendChild(line); el.appendChild(inner); }
  return el;
}

function placeholder(w, h) {
  const ratio = (w && h) ? w/h : 4/3;
  const ph = 600; const pw = Math.round(ph * ratio);
  return 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="'+pw+'" height="'+ph+'">'+
    '<rect fill="#f2ede5" width="'+pw+'" height="'+ph+'"/>'+
    '<rect fill="#e8e1d5" x="0" y="0" width="'+pw+'" height="'+ph+'" rx="0"/>'+
    '<text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#c4bcaa" font-size="22" font-family="sans-serif">+ 上传照片</text>'+
    '</svg>'
  );
}

// ==================== EDIT MODE ====================
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editToggle').classList.toggle('active', editMode);
  const titleEl = document.getElementById('topTitle');
  titleEl.contentEditable = editMode;
  titleEl.style.cssText = editMode
    ? 'outline:1px dashed rgba(184,148,75,.25);border-radius:4px;padding:2px 8px;'
    : '';
  renderStream();
}

document.getElementById('topTitle').addEventListener('input', function() {
  if (!editMode) return;
  _cache.title = this.textContent;
  persist();
});

// ==================== EDIT OVERLAY ====================
function openEditOverlay(idx) {
  editingIdx = idx;
  const item = _cache.media[idx];
  document.getElementById('eoLeft').value = item.left || '';
  document.getElementById('eoRight').value = item.right || '';
  document.getElementById('editOverlay').classList.add('open');
  document.getElementById('eoDelete').onclick = function() {
    deleteMedia(idx); closeEditOverlay();
  };
}

function closeEditOverlay() {
  document.getElementById('editOverlay').classList.remove('open');
  editingIdx = -1;
}

async function saveAnnotation() {
  if (editingIdx < 0) return;
  _cache.media[editingIdx].left = document.getElementById('eoLeft').value;
  _cache.media[editingIdx].right = document.getElementById('eoRight').value;
  await persist();
  renderStream();
  closeEditOverlay();
}

async function deleteMedia(idx) {
  if (!confirm('确定删除吗？')) return;
  _cache.media.splice(idx, 1);
  await persist();
  renderStream();
}

// ==================== ADD MEDIA ====================
async function addPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  input.value = '';

  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const base64 = await new Promise((resolve) => {
      const r = new FileReader();
      r.onload = (e) => resolve(e.target.result);
      r.readAsDataURL(file);
    });
    const dims = await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve({ w: img.width, h: img.height });
      img.src = base64;
    });
    _cache.media.push({ type:'image', src:base64, w:dims.w, h:dims.h, left:'', right:'' });
  }
  await persist();
  renderStream();
}

async function addVideo(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';

  // Read base64 for storage
  const base64 = await new Promise((resolve) => {
    const r = new FileReader();
    r.onload = (e) => resolve(e.target.result);
    r.readAsDataURL(file);
  });

  // Use original file for poster extraction and dimensions
  const blobUrl = URL.createObjectURL(file);
  const info = await new Promise((resolve) => {
    const v = document.createElement('video');
    v.preload = 'metadata'; v.muted = true;
    v.src = blobUrl;
    v.onloadedmetadata = () => { v.currentTime = 1; };
    v.onseeked = () => {
      let poster = '';
      try {
        const c = document.createElement('canvas');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        poster = c.toDataURL('image/jpeg', .7);
      } catch(_) {}
      resolve({ w: v.videoWidth || 1920, h: v.videoHeight || 1080, poster });
    };
    v.onerror = () => resolve({ w: 1920, h: 1080, poster: '' });
  });
  URL.revokeObjectURL(blobUrl);

  _cache.media.push({ type:'video', src:base64, w:info.w, h:info.h, left:'', right:'', poster:info.poster });
  await persist();
  renderStream();
}

// ==================== LIGHTBOX ====================
function openLightbox(src) {
  if (editMode) return;
  document.getElementById('lbImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ==================== SETTINGS ====================
function toggleSettings(type) {
  if (settingsType === type && document.getElementById('settingsPanel').classList.contains('open')) {
    closeSettings(); return;
  }
  settingsType = type;
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('settingsOverlay');
  const title = document.getElementById('settingsTitle');
  const content = document.getElementById('settingsContent');

  if (type === 'bg') {
    title.textContent = '更换背景';
    content.innerHTML =
      '<div class="settings-group"><label>上传背景图片</label>'+
      '<div class="upload-zone" onclick="document.getElementById(\'uploadBg\').click()">📁 选择图片文件</div></div>'+
      '<div class="settings-group"><label>或输入图片 URL</label>'+
      '<input type="text" id="bgUrl" placeholder="https://..." value="'+
      (_cache.bg&&!_cache.bg.startsWith('data:')?escHtml(_cache.bg):'')+'">'+
      '<button class="btn btn-prime" style="margin-top:.6rem;width:100%;" onclick="applyBgUrl()">应用</button></div>'+
      (_cache.bg ? '<button class="btn btn-ghost" style="width:100%;" onclick="removeBg()">移除背景</button>' : '');
  } else if (type === 'music') {
    title.textContent = '更换配乐';
    content.innerHTML =
      '<div class="settings-group"><label>上传音频文件</label>'+
      '<div class="upload-zone" onclick="document.getElementById(\'uploadAudio\').click()">📁 选择音频 (MP3/WAV)</div>'+
      (_cache.musicName ? '<p style="font-size:.78rem;color:var(--gold);margin-top:.5rem;">当前：'+
        escHtml(_cache.musicName)+'</p>' : '')+'</div>'+
      '<div class="settings-group"><label>或输入音频 URL</label>'+
      '<input type="text" id="musicUrl" placeholder="https://..." value="'+
      (_cache.musicUrl&&!_cache.musicUrl.startsWith('data:')?escHtml(_cache.musicUrl):'')+'">'+
      '<input type="text" id="musicName" placeholder="曲目名称" style="margin-top:.5rem;" value="'+
      (_cache.musicName&&!_cache.musicUrl.startsWith('data:')?escHtml(_cache.musicName):'')+'">'+
      '<button class="btn btn-prime" style="margin-top:.6rem;width:100%;" onclick="applyMusicUrl()">应用</button></div>'+
      (_cache.musicUrl ? '<button class="btn btn-ghost" style="width:100%;" onclick="removeMusic()">移除配乐</button>' : '');
  }

  panel.classList.add('open');
  overlay.classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('settingsOverlay').classList.remove('open');
  settingsType = '';
}

async function applyBgUrl() {
  const url = document.getElementById('bgUrl').value.trim();
  if (!url) return;
  _cache.bg = url; await persist();
  applyBg(url); closeSettings();
}
async function removeBg() {
  _cache.bg = ''; await persist();
  applyBg(''); closeSettings();
}
async function applyMusicUrl() {
  const url = document.getElementById('musicUrl').value.trim();
  const name = document.getElementById('musicName').value.trim()||'配乐';
  if (!url) return;
  _cache.musicUrl = url; _cache.musicName = name; await persist();
  applyMusic(url, name); closeSettings();
}
async function removeMusic() {
  _cache.musicUrl = ''; _cache.musicName = ''; await persist();
  applyMusic('','');
  document.getElementById('audioPlayer').pause();
  document.getElementById('musicPlayBtn').textContent = '▶';
  closeSettings();
}

async function changeBg(input) {
  const file = input.files[0];
  if (!file) return;
  const base64 = await new Promise((resolve) => {
    const r = new FileReader(); r.onload = (e) => resolve(e.target.result); r.readAsDataURL(file);
  });
  _cache.bg = base64; await persist();
  applyBg(base64); closeSettings();
  input.value = '';
}

async function changeMusic(input) {
  const file = input.files[0];
  if (!file) return;
  const base64 = await new Promise((resolve) => {
    const r = new FileReader(); r.onload = (e) => resolve(e.target.result); r.readAsDataURL(file);
  });
  _cache.musicUrl = base64;
  _cache.musicName = file.name.replace(/\.[^.]+$/, '');
  await persist();
  applyMusic(base64, _cache.musicName);
  closeSettings();
  input.value = '';
}

// ==================== MUSIC PLAYER ====================
function toggleMusic() {
  const audio = document.getElementById('audioPlayer');
  const btn = document.getElementById('musicPlayBtn');
  if (!audio.src) { toggleSettings('music'); return; }
  if (audio.paused) { audio.play().catch(()=>{}); btn.textContent='⏸'; }
  else { audio.pause(); btn.textContent='▶'; }
}
document.getElementById('audioPlayer').addEventListener('play', ()=>{
  document.getElementById('musicPlayBtn').textContent='⏸';
});
document.getElementById('audioPlayer').addEventListener('pause', ()=>{
  document.getElementById('musicPlayBtn').textContent='▶';
});

// ==================== UTILS ====================
function escHtml(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// ==================== KEYBOARD ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeLightbox(); closeEditOverlay(); closeSettings();
  }
});

// ==================== BOOTSTRAP ====================
init();
</script>
