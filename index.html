<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #1a1a1c;
  --surface: #242427;
  --text: #d4cfc7;
  --text-dim: #999590;
  --gold: #c9a96e;
  --gold-light: #dcc89b;
  --gold-dim: #8a7348;
  --radius: 6px;
  --transition: 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; background:var(--bg); }

body {
  font-family: 'Noto Serif SC', 'Cormorant Garamond', Georgia, serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  transition: background .6s;
}

/* ===== Background Layer ===== */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg);
  transition: opacity .8s;
}
.bg-layer.has-image {
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.bg-layer::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,.55);
}

/* ===== Top Bar ===== */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem;
  background: linear-gradient(to bottom, rgba(26,26,28,.9), transparent);
  pointer-events: none;
}
.top-bar > * { pointer-events: auto; }
.site-title {
  font-family: 'Cormorant Garamond', 'Playfair Display', serif;
  font-size: 1.1rem; font-weight: 300; letter-spacing: 3px;
  color: var(--text-dim); text-transform: uppercase;
}
.top-actions {
  display: flex; gap: .5rem; align-items: center;
}
.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(0,0,0,.3); color: var(--text-dim);
  cursor: pointer; font-size: .95rem;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  backdrop-filter: blur(8px);
  position: relative;
}
.icon-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(0,0,0,.5); }
.icon-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,169,110,.15); }
.icon-btn .tooltip {
  display: none; position: absolute; top: 110%; right: 0;
  white-space: nowrap; font-size: .75rem; color: var(--text-dim);
  background: rgba(0,0,0,.8); padding: .3rem .7rem; border-radius: 4px;
  pointer-events: none;
}
.icon-btn:hover .tooltip { display: block; }

/* ===== Main Media Stage ===== */
.media-stage {
  position: relative; z-index: 1;
  max-width: 1400px; margin: 0 auto;
  padding: 5rem 1.5rem 3rem;
  min-height: 100vh;
}
.media-grid {
  display: flex; flex-wrap: wrap; justify-content: center;
  align-items: flex-start; gap: .8rem;
  padding: 2rem 0;
}

/* ===== Media Card ===== */
.media-card {
  position: relative;
  display: flex; align-items: center;
  flex-shrink: 0;
  transition: transform var(--transition), z-index 0s;
  z-index: 1;
  cursor: default;
}
.media-card:hover { z-index: 20; }

.media-card-inner {
  position: relative;
  display: flex; align-items: center;
  border-radius: var(--radius);
  overflow: visible;
  transition: transform var(--transition), box-shadow var(--transition);
  background: var(--surface);
}
.media-card:hover .media-card-inner {
  transform: scale(1.18);
  box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.08);
}

/* Image wrapper */
.media-img-wrap {
  position: relative; overflow: hidden;
  border-radius: var(--radius);
  flex-shrink: 0;
}
.media-img-wrap img {
  display: block; height: 100%; width: auto;
  object-fit: cover; border-radius: var(--radius);
  transition: transform .6s cubic-bezier(.25,.46,.45,.94);
}
.media-card:hover .media-img-wrap img {
  transform: scale(1.03);
}

/* ===== Annotations ===== */
.annotation {
  flex-shrink: 0;
  width: 0;
  opacity: 0;
  overflow: hidden;
  white-space: nowrap;
  transition: width var(--transition), opacity var(--transition), padding var(--transition);
  color: var(--gold-light);
  font-size: .9rem;
  writing-mode: horizontal-tb;
  max-width: 180px;
}
.annotation-inner {
  padding: 0 1.2rem;
  font-family: 'Noto Serif SC', serif;
  font-weight: 300; letter-spacing: 1px;
  line-height: 1.6;
  font-style: italic;
  color: var(--gold-light);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
  white-space: normal;
  word-break: break-word;
}
.annotation-left { text-align: right; }
.annotation-right { text-align: left; }

.media-card:hover .annotation {
  width: 180px; opacity: 1;
}
.media-card:hover .annotation-left { padding-right: 0; }
.media-card:hover .annotation-right { padding-left: 0; }
.media-card:hover .annotation-inner { padding: 0 1.2rem; }

/* Dim other cards when one is hovered */
.media-grid:hover .media-card:not(:hover) .media-card-inner {
  transform: scale(0.92);
  filter: brightness(.55) blur(1px);
}

/* ===== Video Card ===== */
.video-wrap {
  position: relative; border-radius: var(--radius); overflow: hidden;
  cursor: pointer; background: #000;
}
.video-wrap video {
  display: block; border-radius: var(--radius);
  object-fit: cover;
}
.video-wrap .play-hint {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,.35);
  transition: opacity .3s;
  pointer-events: none;
}
.video-wrap .play-hint::after {
  content: '▶'; font-size: 2.5rem; color: rgba(255,255,255,.8);
  text-shadow: 0 2px 8px rgba(0,0,0,.5);
  transition: transform .3s;
}
.video-wrap:hover .play-hint { opacity: 0; }
.video-wrap.playing .play-hint { opacity: 0; }

/* ===== Edit Mode ===== */
.edit-mode .media-card { cursor: pointer; }
.edit-mode .media-card:hover .media-card-inner {
  transform: scale(1.08);
  box-shadow: 0 0 0 2px var(--gold), 0 12px 40px rgba(0,0,0,.5);
}
.edit-mode .media-grid:hover .media-card:not(:hover) .media-card-inner {
  transform: scale(0.95); filter: brightness(.7);
}
.edit-mode .annotation { width: 140px !important; opacity: .7 !important; }
.edit-mode .annotation-inner {
  outline: 1px dashed rgba(201,169,110,.3);
  border-radius: 4px; padding: .5rem .8rem !important;
  font-style: normal; font-size: .8rem; cursor: text;
}
.edit-mode .annotation-inner:focus {
  outline: 1px solid var(--gold);
  color: #fff;
}

/* ===== Add Media Buttons (edit mode) ===== */
.add-media-bar {
  display: none; position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%); z-index: 50;
  gap: 1rem;
}
.edit-mode .add-media-bar { display: flex; }
.add-media-btn {
  padding: .7rem 1.5rem; border-radius: 999px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(0,0,0,.6); color: var(--gold);
  cursor: pointer; font-family: inherit; font-size: .85rem;
  letter-spacing: 1px; backdrop-filter: blur(8px);
  transition: var(--transition);
}
.add-media-btn:hover { border-color: var(--gold); background: rgba(201,169,110,.15); }

/* ===== Media Edit Overlay (edit mode on click) ===== */
.edit-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.85); align-items: center; justify-content: center;
}
.edit-overlay.open { display: flex; }
.edit-overlay-content {
  background: var(--surface); border-radius: 12px;
  padding: 2rem; max-width: 500px; width: 90%;
  border: 1px solid rgba(255,255,255,.1);
}
.edit-overlay-content h3 { font-weight: 400; margin-bottom: 1.5rem; color: var(--gold); }
.edit-overlay-content input, .edit-overlay-content textarea {
  width: 100%; padding: .8rem 1rem; margin-bottom: 1rem;
  background: var(--bg); border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px; color: var(--text); font-family: inherit; font-size: .9rem;
}
.edit-overlay-content textarea { min-height: 80px; resize: vertical; }
.edit-overlay-content .btn-row { display: flex; gap: .5rem; justify-content: flex-end; }

.btn {
  padding: .6rem 1.4rem; border-radius: 6px; cursor: pointer;
  font-family: inherit; font-size: .85rem; border: none; transition: var(--transition);
}
.btn-primary { background: var(--gold); color: #1a1a1c; }
.btn-primary:hover { background: var(--gold-light); }
.btn-danger { background: transparent; color: #c44; border: 1px solid rgba(204,68,68,.3); }
.btn-danger:hover { background: rgba(204,68,68,.1); }
.btn-secondary { background: transparent; color: var(--text-dim); border: 1px solid rgba(255,255,255,.1); }
.btn-secondary:hover { border-color: rgba(255,255,255,.3); }

/* ===== Lightbox ===== */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.94); align-items: center; justify-content: center;
  cursor: zoom-out;
}
.lightbox.open { display: flex; }
.lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; border-radius: 4px; }
.lightbox-close {
  position: absolute; top: 1.5rem; right: 2rem;
  color: rgba(255,255,255,.6); font-size: 2.5rem; cursor: pointer;
  background: none; border: none; z-index: 301; font-weight: 300;
}

/* ===== Music Mini Player ===== */
.music-mini {
  position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 80;
  display: flex; align-items: center; gap: .6rem;
  background: rgba(0,0,0,.5); backdrop-filter: blur(12px);
  border-radius: 999px; padding: .5rem .9rem .5rem .5rem;
  border: 1px solid rgba(255,255,255,.08);
  transition: var(--transition);
}
.music-mini:hover { border-color: rgba(255,255,255,.2); }
.music-mini-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(255,255,255,.1);
  color: var(--text-dim); cursor: pointer; font-size: .8rem;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
}
.music-mini-btn:hover { background: var(--gold); color: #1a1a1c; }
.music-mini-info {
  font-size: .75rem; color: var(--text-dim);
  max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}
.music-mini-info:hover { color: var(--gold); }

/* ===== Settings Panel ===== */
.settings-panel {
  position: fixed; top: 0; right: -420px; width: 400px; height: 100vh;
  z-index: 150; background: var(--surface);
  border-left: 1px solid rgba(255,255,255,.08);
  transition: right var(--transition); padding: 4rem 2rem 2rem;
  overflow-y: auto;
}
.settings-panel.open { right: 0; }
.settings-panel h3 {
  font-weight: 400; color: var(--gold); margin-bottom: 1.5rem;
  font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; letter-spacing: 1px;
}
.settings-group { margin-bottom: 2rem; }
.settings-group label {
  display: block; font-size: .8rem; color: var(--text-dim);
  margin-bottom: .5rem; letter-spacing: .5px;
}
.settings-group input {
  width: 100%; padding: .7rem 1rem; background: var(--bg);
  border: 1px solid rgba(255,255,255,.08); border-radius: 6px;
  color: var(--text); font-family: inherit; font-size: .85rem;
}
.settings-upload {
  display: flex; align-items: center; gap: .8rem; padding: .7rem 1rem;
  background: var(--bg); border: 1px dashed rgba(255,255,255,.12);
  border-radius: 6px; cursor: pointer; color: var(--text-dim);
  font-size: .85rem; transition: var(--transition);
}
.settings-upload:hover { border-color: var(--gold); color: var(--gold); }
.settings-overlay {
  display: none; position: fixed; inset: 0; z-index: 140;
  background: rgba(0,0,0,.3);
}
.settings-overlay.open { display: block; }

/* ===== Empty State ===== */
.empty-hint {
  text-align: center; padding: 6rem 2rem;
  color: var(--text-dim); font-size: 1rem; font-weight: 300;
}
.empty-hint span { color: var(--gold); cursor: pointer; }

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

/* ===== Animations ===== */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.media-card { animation: fadeUp .8s ease both; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .media-grid { gap: .5rem; }
  .media-card:hover .annotation { width: 100px !important; }
  .media-card:hover .annotation-inner { padding: 0 .5rem !important; font-size: .75rem; }
  .media-card:hover .media-card-inner { transform: scale(1.08); }
  .top-bar { padding: .8rem 1rem; }
  .settings-panel { width: 320px; right: -340px; }
  .edit-overlay-content { max-width: 90%; padding: 1.5rem; }
}
@media (max-width: 600px) {
  .media-stage { padding: 4rem .5rem 2rem; }
  .media-card { width: 100% !important; }
  .media-card:hover .annotation { width: 0 !important; opacity: 0 !important; }
  .media-card:hover .media-card-inner { transform: scale(1.03); }
  .media-grid:hover .media-card:not(:hover) .media-card-inner { filter: brightness(.7) blur(0); }
  .add-media-bar { bottom: 1rem; gap: .5rem; }
  .add-media-btn { padding: .5rem 1rem; font-size: .75rem; }
  .music-mini { bottom: .8rem; right: .8rem; }
}
</style>
</head>
<body>

<!-- Background -->
<div class="bg-layer" id="bgLayer"></div>

<!-- Top Bar -->
<header class="top-bar">
  <span class="site-title" id="siteTitle" contenteditable="false">MY SPACE</span>
  <div class="top-actions">
    <button class="icon-btn" id="bgBtn" onclick="toggleSettings('bg')" title="更换背景">
      🖼<span class="tooltip">更换背景</span>
    </button>
    <button class="icon-btn" id="musicBtn" onclick="toggleSettings('music')" title="更换配乐">
      ♪<span class="tooltip">更换配乐</span>
    </button>
    <button class="icon-btn" id="editToggle" onclick="toggleEditMode()" title="编辑">
      ✎<span class="tooltip">编辑模式</span>
    </button>
  </div>
</header>

<!-- Media Stage -->
<main class="media-stage" id="mediaStage">
  <div class="media-grid" id="mediaGrid"></div>
  <div class="empty-hint" id="emptyHint" style="display:none">
    还没有内容，<span onclick="document.getElementById('uploadPhoto').click()">上传照片</span> 或 <span onclick="document.getElementById('uploadVideoInput').click()">添加视频</span> 开始吧
  </div>
</main>

<!-- Add Media Bar (Edit Mode) -->
<div class="add-media-bar" id="addMediaBar">
  <button class="add-media-btn" onclick="document.getElementById('uploadPhoto').click()">＋ 添加照片</button>
  <button class="add-media-btn" onclick="document.getElementById('uploadVideoInput').click()">＋ 添加视频</button>
</div>

<!-- Settings Panel -->
<div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>
<div class="settings-panel" id="settingsPanel">
  <h3 id="settingsTitle">设置</h3>
  <div id="settingsContent"></div>
</div>

<!-- Edit Overlay (for annotations) -->
<div class="edit-overlay" id="editOverlay">
  <div class="edit-overlay-content">
    <h3>编辑标注</h3>
    <label style="font-size:.8rem;color:var(--text-dim);">左侧文字</label>
    <textarea id="editLeftAnno" placeholder="鼠标悬停时显示在左侧的文字..."></textarea>
    <label style="font-size:.8rem;color:var(--text-dim);">右侧文字</label>
    <textarea id="editRightAnno" placeholder="鼠标悬停时显示在右侧的文字..."></textarea>
    <div class="btn-row">
      <button class="btn btn-danger" id="editDeleteBtn" style="margin-right:auto;">删除</button>
      <button class="btn btn-secondary" onclick="closeEditOverlay()">取消</button>
      <button class="btn btn-primary" onclick="saveAnnotation()">保存</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close">&times;</button>
  <img src="" alt="" id="lightboxImg">
</div>

<!-- Music Mini Player -->
<div class="music-mini" id="musicMini">
  <button class="music-mini-btn" id="musicPlayBtn" onclick="toggleMusic()">▶</button>
  <span class="music-mini-info" id="musicInfo" onclick="toggleSettings('music')">未选择配乐</span>
  <input type="range" id="volumeSlider" min="0" max="100" value="30" style="width:60px;display:none;" oninput="setVolume(this.value)">
  <audio id="audioPlayer" style="display:none" loop></audio>
</div>

<!-- Hidden Inputs -->
<input type="file" id="uploadPhoto" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
<input type="file" id="uploadBg" accept="image/*" style="display:none" onchange="changeBg(this)">
<input type="file" id="uploadAudio" accept="audio/*" style="display:none" onchange="changeMusic(this)">
<input type="file" id="uploadVideoInput" accept="video/*" style="display:none" onchange="addVideoFile(this)">

<script>
// ==================== DATA MODEL ====================
const STORAGE_KEY = 'myspace_data';

const DEFAULTS = {
  siteTitle: 'MY SPACE',
  bgImage: '',
  musicUrl: '',
  musicName: '',
  media: [
    { type:'image', src:'', width:1600, height:1200, leftAnno:'', rightAnno:'' },
    { type:'image', src:'', width:1200, height:1600, leftAnno:'', rightAnno:'' },
    { type:'image', src:'', width:1600, height:1067, leftAnno:'', rightAnno:'' },
    { type:'image', src:'', width:1200, height:1600, leftAnno:'', rightAnno:'' },
    { type:'image', src:'', width:1600, height:1200, leftAnno:'', rightAnno:'' },
    { type:'video', src:'', width:1920, height:1080, leftAnno:'', rightAnno:'', poster:'' },
  ]
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {
    if (e.name === 'QuotaExceededError') alert('存储空间不足，请删除一些媒体文件');
  }
}

function getStore() {
  let data = loadData();
  if (!data) { data = JSON.parse(JSON.stringify(DEFAULTS)); saveData(data); }
  // Ensure all fields exist
  data.siteTitle = data.siteTitle ?? DEFAULTS.siteTitle;
  data.bgImage = data.bgImage ?? DEFAULTS.bgImage;
  data.musicUrl = data.musicUrl ?? DEFAULTS.musicUrl;
  data.musicName = data.musicName ?? DEFAULTS.musicName;
  data.media = data.media ?? DEFAULTS.media;
  return data;
}

let editMode = false;
let editingMediaIndex = -1;
let settingsMode = '';

// ==================== INIT ====================
function init() {
  const store = getStore();
  document.getElementById('siteTitle').textContent = store.siteTitle || 'MY SPACE';
  applyBg(store.bgImage);
  applyMusic(store.musicUrl, store.musicName);
  renderMedia();
  // Also make title editable in edit mode
  updateSiteTitleState();
}

function applyBg(bgImage) {
  const layer = document.getElementById('bgLayer');
  if (bgImage) {
    layer.classList.add('has-image');
    layer.style.backgroundImage = 'url(' + bgImage + ')';
  } else {
    layer.classList.remove('has-image');
    layer.style.backgroundImage = '';
  }
}

function applyMusic(url, name) {
  const audio = document.getElementById('audioPlayer');
  const info = document.getElementById('musicInfo');
  if (url) {
    audio.src = url;
    info.textContent = name || '自定义配乐';
  } else {
    audio.src = '';
    info.textContent = '未选择配乐';
  }
}

// ==================== RENDER MEDIA ====================
function renderMedia() {
  const store = getStore();
  const grid = document.getElementById('mediaGrid');
  const emptyHint = document.getElementById('emptyHint');
  const media = store.media || [];

  grid.innerHTML = '';

  if (media.length === 0) {
    emptyHint.style.display = 'block';
    return;
  }
  emptyHint.style.display = 'none';

  media.forEach((item, i) => {
    const card = createMediaCard(item, i);
    card.style.animationDelay = (i * 0.08) + 's';
    grid.appendChild(card);
  });
}

function createMediaCard(item, index) {
  const card = document.createElement('div');
  card.className = 'media-card';
  card.dataset.index = index;

  const inner = document.createElement('div');
  inner.className = 'media-card-inner';

  if (item.type === 'video') {
    // Left annotation
    const leftAnno = createAnnotationEl('left', item.leftAnno);
    inner.appendChild(leftAnno);

    // Video element
    const wrap = document.createElement('div');
    wrap.className = 'video-wrap';
    wrap.style.width = '320px';
    wrap.style.height = '240px';

    const video = document.createElement('video');
    video.src = item.src || '';
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.style.width = '100%';
    video.style.height = '100%';
    if (item.poster) video.poster = item.poster;

    const hint = document.createElement('div');
    hint.className = 'play-hint';

    wrap.appendChild(video);
    wrap.appendChild(hint);

    // Hover play/pause
    wrap.addEventListener('mouseenter', () => {
      video.play().catch(() => {});
      wrap.classList.add('playing');
    });
    wrap.addEventListener('mouseleave', () => {
      video.pause();
      video.currentTime = 0;
      wrap.classList.remove('playing');
    });

    // Click in non-edit mode opens lightbox-ish view (fullscreen video)
    wrap.addEventListener('click', (e) => {
      if (editMode) { openEditOverlay(index); return; }
      if (video.paused) {
        video.play().catch(() => {});
        wrap.classList.add('playing');
      } else {
        video.pause();
        wrap.classList.remove('playing');
      }
    });

    inner.appendChild(wrap);

    // Right annotation
    const rightAnno = createAnnotationEl('right', item.rightAnno);
    inner.appendChild(rightAnno);
  } else {
    // Image type
    const leftAnno = createAnnotationEl('left', item.leftAnno);
    inner.appendChild(leftAnno);

    const imgWrap = document.createElement('div');
    imgWrap.className = 'media-img-wrap';

    // Calculate display height based on aspect ratio
    const ratio = item.width && item.height ? item.width / item.height : 4/3;
    const displayH = 280;
    const displayW = Math.round(displayH * ratio);
    imgWrap.style.height = displayH + 'px';
    imgWrap.style.width = displayW + 'px';

    const img = document.createElement('img');
    img.src = item.src || placeholderImg(item.width, item.height);
    img.alt = 'Photo ' + (index + 1);
    img.loading = 'lazy';
    imgWrap.appendChild(img);

    // Click behavior
    imgWrap.addEventListener('click', (e) => {
      if (editMode) { e.stopPropagation(); openEditOverlay(index); return; }
      openLightbox(item.src || placeholderImg(item.width, item.height));
    });

    inner.appendChild(imgWrap);

    const rightAnno = createAnnotationEl('right', item.rightAnno);
    inner.appendChild(rightAnno);
  }

  card.appendChild(inner);
  return card;
}

function createAnnotationEl(side, text) {
  const div = document.createElement('div');
  div.className = 'annotation annotation-' + side;
  const inner = document.createElement('div');
  inner.className = 'annotation-inner';
  inner.textContent = text || '';
  div.appendChild(inner);
  return div;
}

function placeholderImg(w, h) {
  // Generate a beautiful gradient placeholder
  const ratio = (w && h) ? w/h : 4/3;
  const ph = 280; const pw = Math.round(ph * ratio);
  const hue = Math.floor(Math.random() * 60) + 200; // blue-ish tones
  return 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="'+pw+'" height="'+ph+'">' +
    '<rect fill="#2a2a2e" width="'+pw+'" height="'+ph+'"/>' +
    '<text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#555" font-size="18" font-family="sans-serif">点击上传照片</text>' +
    '</svg>'
  );
}

// ==================== EDIT MODE ====================
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('editToggle');
  document.body.classList.toggle('edit-mode', editMode);
  if (editMode) {
    btn.classList.add('active');
  } else {
    btn.classList.remove('active');
  }
  updateSiteTitleState();
  renderMedia(); // re-render to update click behaviors
}

function updateSiteTitleState() {
  const title = document.getElementById('siteTitle');
  title.contentEditable = editMode;
  if (editMode) {
    title.style.outline = '1px dashed rgba(201,169,110,.3)';
    title.style.borderRadius = '4px';
    title.style.padding = '2px 8px';
  } else {
    title.style.outline = '';
    title.style.borderRadius = '';
    title.style.padding = '';
  }
}

// Save title on input
document.getElementById('siteTitle').addEventListener('input', function() {
  if (!editMode) return;
  const store = getStore();
  store.siteTitle = this.textContent;
  saveData(store);
});

// ==================== ANNOTATION EDITING ====================
function openEditOverlay(index) {
  editingMediaIndex = index;
  const store = getStore();
  const item = store.media[index];
  document.getElementById('editLeftAnno').value = item.leftAnno || '';
  document.getElementById('editRightAnno').value = item.rightAnno || '';
  document.getElementById('editOverlay').classList.add('open');
  document.getElementById('editDeleteBtn').onclick = function() {
    deleteMedia(index);
    closeEditOverlay();
  };
}

function closeEditOverlay() {
  document.getElementById('editOverlay').classList.remove('open');
  editingMediaIndex = -1;
}

function saveAnnotation() {
  if (editingMediaIndex < 0) return;
  const store = getStore();
  store.media[editingMediaIndex].leftAnno = document.getElementById('editLeftAnno').value;
  store.media[editingMediaIndex].rightAnno = document.getElementById('editRightAnno').value;
  saveData(store);
  renderMedia();
  closeEditOverlay();
}

function deleteMedia(index) {
  if (!confirm('确定删除这个媒体吗？')) return;
  const store = getStore();
  store.media.splice(index, 1);
  saveData(store);
  renderMedia();
}

// ==================== ADD PHOTOS ====================
function addPhotos(input) {
  const files = Array.from(input.files);
  if (!files.length) return;

  const store = getStore();
  let processed = 0;

  files.forEach(file => {
    if (!file.type.startsWith('image/')) { processed++; return; }
    if (file.size > 8 * 1024 * 1024) { alert(file.name + ' 超过 8MB，已跳过'); processed++; return; }

    const reader = new FileReader();
    reader.onload = function(e) {
      // Get image dimensions
      const img = new Image();
      img.onload = function() {
        store.media.push({
          type: 'image',
          src: e.target.result,
          width: img.width,
          height: img.height,
          leftAnno: '',
          rightAnno: ''
        });
        processed++;
        if (processed === files.length) {
          saveData(store);
          renderMedia();
        }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  input.value = '';
}

// ==================== ADD VIDEO ====================
function addVideoFile(input) {
  const file = input.files[0];
  if (!file) return;

  if (file.size > 30 * 1024 * 1024) { alert('视频超过 30MB，建议使用较小的文件'); return; }

  const store = getStore();
  const reader = new FileReader();
  reader.onload = function(e) {
    // Generate a poster from video first frame
    const video = document.createElement('video');
    video.preload = 'metadata';
    video.muted = true;

    const blobUrl = URL.createObjectURL(file);
    video.src = blobUrl;

    video.onloadeddata = function() {
      // Try to capture poster frame
      video.currentTime = 1;
    };

    video.onseeked = function() {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const poster = canvas.toDataURL('image/jpeg', 0.7);

        store.media.push({
          type: 'video',
          src: e.target.result,
          width: video.videoWidth,
          height: video.videoHeight,
          leftAnno: '',
          rightAnno: '',
          poster: poster
        });
      } catch(err) {
        store.media.push({
          type: 'video',
          src: e.target.result,
          width: 1920,
          height: 1080,
          leftAnno: '',
          rightAnno: '',
          poster: ''
        });
      }
      URL.revokeObjectURL(blobUrl);
      saveData(store);
      renderMedia();
    };
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ==================== LIGHTBOX ====================
function openLightbox(src) {
  if (editMode) return;
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

// ==================== SETTINGS PANEL ====================
function toggleSettings(mode) {
  if (settingsMode === mode && document.getElementById('settingsPanel').classList.contains('open')) {
    closeSettings();
    return;
  }
  settingsMode = mode;
  const panel = document.getElementById('settingsPanel');
  const overlay = document.getElementById('settingsOverlay');
  const title = document.getElementById('settingsTitle');
  const content = document.getElementById('settingsContent');
  const store = getStore();

  if (mode === 'bg') {
    title.textContent = '更换背景';
    content.innerHTML = `
      <div class="settings-group">
        <label>上传背景图片</label>
        <div class="settings-upload" onclick="document.getElementById('uploadBg').click()">
          <span>📁</span> 选择图片文件
        </div>
      </div>
      <div class="settings-group">
        <label>或输入图片URL</label>
        <input type="text" id="bgUrlInput" placeholder="https://..." value="${store.bgImage && !store.bgImage.startsWith('data:') ? store.bgImage : ''}">
        <button class="btn btn-primary" style="margin-top:.8rem;width:100%;" onclick="applyBgUrl()">应用背景</button>
      </div>
      ${store.bgImage ? `<button class="btn btn-secondary" style="width:100%;margin-top:.5rem;" onclick="removeBg()">移除背景</button>` : ''}
    `;
  } else if (mode === 'music') {
    title.textContent = '更换配乐';
    content.innerHTML = `
      <div class="settings-group">
        <label>上传音频文件</label>
        <div class="settings-upload" onclick="document.getElementById('uploadAudio').click()">
          <span>📁</span> 选择音频 (MP3/WAV)
        </div>
        ${store.musicName ? `<p style="font-size:.8rem;color:var(--gold);margin-top:.5rem;">当前: ${store.musicName}</p>` : ''}
      </div>
      <div class="settings-group">
        <label>或输入音频URL</label>
        <input type="text" id="musicUrlInput" placeholder="https://..." value="${store.musicUrl && !store.musicUrl.startsWith('data:') ? store.musicUrl : ''}">
        <input type="text" id="musicNameInput" placeholder="曲目名称" value="${store.musicName && !store.musicUrl.startsWith('data:') ? store.musicName : ''}" style="margin-top:.5rem;">
        <button class="btn btn-primary" style="margin-top:.8rem;width:100%;" onclick="applyMusicUrl()">应用配乐</button>
      </div>
      ${store.musicUrl ? `<button class="btn btn-secondary" style="width:100%;margin-top:.5rem;" onclick="removeMusic()">移除配乐</button>` : ''}
    `;
  }

  panel.classList.add('open');
  overlay.classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsPanel').classList.remove('open');
  document.getElementById('settingsOverlay').classList.remove('open');
  settingsMode = '';
}

function applyBgUrl() {
  const url = document.getElementById('bgUrlInput').value.trim();
  if (!url) return;
  const store = getStore();
  store.bgImage = url;
  saveData(store);
  applyBg(url);
  closeSettings();
}

function removeBg() {
  const store = getStore();
  store.bgImage = '';
  saveData(store);
  applyBg('');
  closeSettings();
}

function applyMusicUrl() {
  const url = document.getElementById('musicUrlInput').value.trim();
  const name = document.getElementById('musicNameInput').value.trim() || '自定义配乐';
  if (!url) return;
  const store = getStore();
  store.musicUrl = url;
  store.musicName = name;
  saveData(store);
  applyMusic(url, name);
  closeSettings();
}

function removeMusic() {
  const store = getStore();
  store.musicUrl = '';
  store.musicName = '';
  saveData(store);
  applyMusic('', '');
  document.getElementById('audioPlayer').pause();
  document.getElementById('musicPlayBtn').textContent = '▶';
  closeSettings();
}

function changeBg(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { alert('背景图片不能超过 5MB'); input.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    const store = getStore();
    store.bgImage = e.target.result;
    saveData(store);
    applyBg(e.target.result);
    closeSettings();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function changeMusic(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { alert('音频文件不能超过 10MB'); input.value = ''; return; }
  const url = URL.createObjectURL(file);
  const name = file.name.replace(/\.[^.]+$/, '');
  const store = getStore();

  // Read as base64 for persistence
  const reader = new FileReader();
  reader.onload = function(e) {
    URL.revokeObjectURL(url);
    store.musicUrl = e.target.result;
    store.musicName = name;
    saveData(store);
    applyMusic(e.target.result, name);
    closeSettings();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ==================== MUSIC PLAYER ====================
function toggleMusic() {
  const audio = document.getElementById('audioPlayer');
  const btn = document.getElementById('musicPlayBtn');
  if (!audio.src) { toggleSettings('music'); return; }
  if (audio.paused) {
    audio.play().catch(() => {});
    btn.textContent = '⏸';
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}

function setVolume(val) {
  document.getElementById('audioPlayer').volume = val / 100;
}

// Audio events
document.getElementById('audioPlayer').addEventListener('play', function() {
  document.getElementById('musicPlayBtn').textContent = '⏸';
});
document.getElementById('audioPlayer').addEventListener('pause', function() {
  document.getElementById('musicPlayBtn').textContent = '▶';
});

// Volume slider toggle on music info click (hold or right-click)
document.getElementById('musicInfo').addEventListener('contextmenu', function(e) {
  e.preventDefault();
  const slider = document.getElementById('volumeSlider');
  slider.style.display = slider.style.display === 'none' ? 'block' : 'none';
});

// ==================== KEYBOARD ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeLightbox();
    closeEditOverlay();
    closeSettings();
  }
});

// ==================== BOOTSTRAP ====================
init();
</script>
